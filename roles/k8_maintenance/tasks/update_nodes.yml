---
# Update and upgrade tasks for Kubernetes nodes
- name: Update all APT packages
  become: true
  apt:
    name: '*'
    state: latest
  when: ansible_os_family == "Debian"

- name: Upgrade OS
  become: true
  apt:
    upgrade: dist
  when: ansible_os_family == "Debian"

- name: Truncate Nginx logs (only on nodes where nginx logs exist)
  become: true
  shell: truncate -s 0 /var/log/nginx/access.log /var/log/nginx/error.log
  args:
    removes: /var/log/nginx/access.log  # skip nodes without nginx instead of failing
  changed_when: false