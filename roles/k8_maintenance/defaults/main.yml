---
# Default variables for k8_maintenance role

# Maintenance workflow step control
k8_maintenance_step: "all"  # Options: pause, maintenance, unpause, all

# Datadog monitoring settings
pause_monitors_enabled: true
pause_duration: 3600  # 1 hour in seconds

# Kubernetes settings
k8_primary_node: "k8-primary"
kubeconfig_path: "/home/huey/.kube/config"  # Path to kubeconfig file
k8s_skip_tls_verify: false  # Set to true for self-signed certificates
k8s_api_server: ""  # Optional: Override API server URL
reboot_delay: 30
reboot_timeout: 600
node_ready_retries: 30
node_ready_delay: 10

# Post-patch pod-restart-reset (cluster health step)
# Deletes controller-owned application pods with RESTARTS > 0 so their
# controllers recreate them with a clean restart count. Cluster services are
# always excluded (by namespace deny-list + static/mirror-pod + ownerRef gates).
pod_restart_reset_enabled: true
pod_restart_reset_dry_run: false        # true -> kubectl --dry-run=server, no deletes
pod_restart_reset_delete_pause: 5       # seconds between pod deletions (anti-thundering-herd)
pod_restart_reset_health_retries: 30    # post-delete: wait for recreated pods to be Ready
pod_restart_reset_health_delay: 10
# Cluster-service namespaces never touched by the restart-reset step.
# (control-plane static pods are also protected by the mirror-pod + ownerRef gates)
pod_restart_reset_exclude_namespaces:
  - kube-system
  - kube-flannel
  - kube-node-lease
  - kube-public
  - local-path-storage
  - monitoring

# Logging settings
update_log_path: "/mnt/QNAP/backuplogs/updates/updates.txt"

# Node processing settings
serial_execution: 1  # Process nodes one at a time