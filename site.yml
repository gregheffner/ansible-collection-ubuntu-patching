---
# Weekly patching for the Ubuntu fleet.
#   Play 1 — k8s cluster, ONE node at a time (cluster stays live).
#   Play 2 — everything else (dockerhost), rebooted LAST because it runs the runner.
#
# Run directly from this checkout:  ansible-playbook -i inventory/hosts site.yml
# Package work (apt + snap + brew + cleanup) lives in the `patch_common` role,
# so both plays share exactly one definition of "patch this box".

# ────────────────────────────────────────────────────────────────────────────
# PLAY 1: Kubernetes cluster — drain → patch → truncate nginx logs → reboot → wait Ready → uncordon
# ────────────────────────────────────────────────────────────────────────────
- name: Patch the Kubernetes cluster (one node at a time)
  hosts: k8s_cluster
  serial: 1                      # exactly one node in flight; cluster keeps quorum/capacity
  become: true
  gather_facts: true
  vars:
    # All kubectl runs go through the control-plane node, which holds the kubeconfig.
    kube_control_host: k8-primary
    kubeconfig: /home/huey/.kube/config

  pre_tasks:
    - name: "Drain {{ inventory_hostname }} (cordon + evict workloads)"
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig {{ kubeconfig }} drain {{ inventory_hostname }}
          --ignore-daemonsets --delete-emptydir-data --force --timeout=300s
      delegate_to: "{{ kube_control_host }}"
      changed_when: true
      when: not ansible_check_mode     # node lifecycle is runtime-only; skip in --check

  roles:
    - role: patch_common

  post_tasks:
    - name: "Truncate nginx logs on {{ inventory_hostname }} (hostPath logs from nginx pods)"
      # Clears the persisted access/error logs that fail2ban re-scans when the
      # nginx pod rolls after a reboot (otherwise old 404s re-trigger bans).
      # `removes:` makes this self-skip on hosts without nginx logs.
      ansible.builtin.command:
        cmd: truncate -s 0 /var/log/nginx/access.log /var/log/nginx/error.log
        removes: /var/log/nginx/access.log
      changed_when: false
      when: not ansible_check_mode

    - name: "Reboot {{ inventory_hostname }} to apply updates (verified come-back)"
      ansible.builtin.reboot:
        reboot_timeout: 900
        post_reboot_delay: 30
        msg: "Weekly patching reboot"
      when: not ansible_check_mode

    - name: "Wait for {{ inventory_hostname }} to report Ready"
      # kubectl wait (no jsonpath/quotes) — the command module shlex-splits cmd,
      # which would strip the inner quotes of a jsonpath filter. wait blocks until
      # the node is Ready; the retry loop covers the API-down window while a
      # control-plane node is mid-reboot (kubectl returns non-zero until the API is up).
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig {{ kubeconfig }} wait --for=condition=Ready
          node/{{ inventory_hostname }} --timeout=300s
      delegate_to: "{{ kube_control_host }}"
      register: node_ready
      changed_when: false
      retries: 20
      delay: 15
      until: node_ready.rc == 0
      when: not ansible_check_mode

    - name: "Uncordon {{ inventory_hostname }} (resume scheduling)"
      ansible.builtin.command:
        cmd: "kubectl --kubeconfig {{ kubeconfig }} uncordon {{ inventory_hostname }}"
      delegate_to: "{{ kube_control_host }}"
      changed_when: true
      when: not ansible_check_mode

# ────────────────────────────────────────────────────────────────────────────
# PLAY 2: Everything else (dockerhost) — patched and rebooted LAST.
# dockerhost runs the self-hosted runner, so its reboot is SCHEDULED for after
# the job exits (shutdown -r +1) instead of killing the job mid-run.
# ────────────────────────────────────────────────────────────────────────────
- name: Patch standalone Ubuntu hosts (dockerhost last)
  # The `docker` group (dockerhost) exists in BOTH the CI secret inventory and
  # /etc/ansible/hosts. The CI inventory has only [k8s_cluster] and [docker] —
  # no [ubuntu] group — so target `docker` here. Add any future non-k8s Ubuntu
  # hosts to this group to have them patched in this play.
  hosts: docker:!k8s_cluster
  become: true
  gather_facts: true

  roles:
    - role: patch_common

  post_tasks:
    - name: Schedule reboot after the job exits (this host runs the runner)
      # Always reboot on a patch run (matches the k8s nodes). Deferred via
      # `shutdown -r +1` so the box reboots ~1 min AFTER this job/playbook exits,
      # instead of killing the self-hosted runner mid-run.
      ansible.builtin.command:
        cmd: shutdown -r +1 "Weekly patching reboot (scheduled)"
      changed_when: true
      when: not ansible_check_mode
